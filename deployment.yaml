apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-deploy
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
        - name: fastapi
          image: keyyds/docker-fastapi:57895ccd458c26ecf214ab597e2f34dd7c874e9d
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
